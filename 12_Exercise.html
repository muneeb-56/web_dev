<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html{
            scroll-behavior: smooth;
        }
    </style>
    <title>Exercise</title>
</head>
<body>

    <header>
        <h2>Media player</h2>
        <nav>
            <ul type="square">
                <li><a href="#mp3">Audio tracks</a></li>
                <li><a href="#mp4">Video tracks</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div>
            <h3 id="mp3">Audio</h3>
            <label for="">1.mp3</label>
            <audio src="audio.mp3" controls></audio>
            <br>

            <label for="">2.mp3</label>
            <audio src="audio.mp3" controls></audio>
            <br>

            <label for="">3.mp3</label>
            <audio src="audio.mp3" controls></audio>
            <br>

            <label for="">4.mp3</label>
            <audio src="audio.mp3" controls></audio>
            <br>

            <label for="">5.mp3</label>
            <audio src="audio.mp3" controls></audio>
            <br>

            <label for="">6.mp3</label>
            <audio src="audio.mp3" controls></audio>
        </div>
            
        <div>
            <h3 id="mp4">Videos</h3>

            <label for="">1.mp4</label>
            <video width="200" src="video.mp4" controls></video>
            <br>
            
            <label for="">2.mp4</label>
            <video width="200" src="video.mp4" controls></video>
            <br>
            <label for="">3.mp4</label>
            <video width="200" src="video.mp4" controls></video>
            <br>
            <label for="">4.mp4</label>
            <video width="200" src="video.mp4" controls></video>
            <br>
            <label for="">5.mp4</label>
            <video width="200" src="video.mp4" controls></video>
            <br>
            <label for="">6.mp4</label>
            <video width="200" src="video.mp4" controls></video>
        </div>
    </main>
</body>
</html>

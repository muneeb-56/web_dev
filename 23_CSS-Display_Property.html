<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Basics (Not-Detailed)</title>

<!-- https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Properties/display -->

    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box1 {
            border: 1px solid blue;
            /* display: inline; width-margins etc disturbed */
            display: inline-block;
            padding: 20px;
            margin: 10px;
        }

        .box2{
            /* display: none; space removed */
            visibility: hidden;  /* Only Visibily gone space retianed.*/
            border: 1px solid blue;
            padding: 30px;
        }

        .flex{
            border: 1px solid red;
            padding: 10px;
            margin: 20px;

            display: flex;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="box2">
        This is a BOX 2.
    </div>
    <div class="box1">
        This is a div.
    </div>
    <span>Span already</span>
    <div class="box1">
        Another box.
    </div>

    <div class="flex">
        Lorem ipsum dolor sit.
    </div>
</body>

</html>

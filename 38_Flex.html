<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>

    <style>

body{
    background-color: black;
}
    .row{
        border: 2px solid red;
        height: 60vh;
        margin: 10px;
        padding: 10px;
        display: flex;
        flex-direction: row-reverse;
        justify-content: center;
        /* align-items: center; */
        align-content: center; /*During Wrap Property*/
        /* align-content: flex-end; */
        /* align-content: flex-start; */
        flex-wrap: wrap;
        /* flex-wrap: wrap-reverse; */

        /* flex-flow: row wrap-reverse; */
        /* it is used to apply direction & wrap at once */
    }
    
    .item{
        background-color: blue;
        border: 1.5px solid rgb(255, 255, 255);
        border-radius: 20px;
        width: 10vw;
        height: 10vh;
        margin: 2px;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .items{
        background-color: rgb(15, 255, 183);
        border: 1.5px solid rgb(255, 255, 255);
        border-radius: 20px;
        width: 10vw;
        height: 10vh;
        margin: 2px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    .col{
        border: 2px solid red;
        height: 70vh;
        margin: 10px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        /* flex-direction: column-reverse; */

        justify-content: center; /*Justify works with Main-Axis first*/
        align-items: center;
    }


    </style>
</head>
<body>
    

    <div class="row">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="items">4</div>
        <div class="items">5</div>
        <div class="items">6</div>
        <div class="item">7</div>
        <div class="item">8</div>
        <div class="item">9</div>
        <div class="items">10</div>
        <div class="items">11</div>
        <div class="items">12</div>
        <div class="item">13</div>
        <div class="item">14</div>
        <div class="item">15</div>
        <div class="items">16</div>
        <div class="items">17</div>
        <div class="items">18</div>
    </div>
    
    <div class="col">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="items">4</div>
        <div class="items">5</div>
        <div class="items">6</div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Web Exercise</title>
    
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        body{
            overflow-x: hidden;
        }
        header{
            width: 100vw;
            height: 12vh;
            display: flex;
            justify-content: center;
            background-color: rgb(33, 33, 33);
            align-items: center;    
            position: sticky;
            top: 0;
            z-index: 1000;
        }
  
        nav ul{
            display: flex;
            gap: 30px;
        }
        nav ul li{
            list-style: none;     
            transition: 0.2s ease transform;
        }
        nav ul li:hover{
            transform: translateY(-2px);
        }
        nav a{
            text-decoration: none;
            color: black;
            padding: 4px 8px;
            border: 1px solid rgb(211, 211, 211);
            border-radius: 20px;
            background-color: white;
        }
        nav a:hover{
            background-color: rgb(218, 218, 218);
        }
        nav a:active{
            background-color: rgb(0, 0, 0);
            color: white;
        }
        .container{
            margin: 30px;
            padding: 10px;
            background-color: blanchedalmond;
            border: 2px solid rgb(33, 33, 33);
            border-radius: 20px;
            height: 70vh;
            display: flex;
            gap: 25px;
            justify-content: center;
            align-items: center;
        }  
        .box{
            background-color: azure;
            border: 1.5px solid rgb(33,33,33);
            border-radius: 20px;
            width: 40vw;
            height: 40vh;
        }
        .text{
            border: 1.5px solid black;
            background-color: rgb(225, 255, 245);
            border-radius: 20px;
            padding: 10px;
            margin: 30px;
            text-align: center;
        }
        footer{
            position: relative;
            background-color: black;
            bottom: 0%;
            color: white;
            font-size: 18px;
            width: 100vw;
            height: 40vh;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">Services</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Contact</a></li>
                
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="box"></div>
            <div class="box"></div>
        </div>

        <div class="text">
            <h2>Welcome</h2>
            <p>
                This is a template web exercise.
            </p>
        </div>
    </main>

    <footer>
        <p>This is the footer.</p>
        <p>All right &reg reserved to Muneeb & Co</p>
    </footer>
</body>
</html>

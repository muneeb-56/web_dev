<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <h1>Unordered list</h1>
    <ul type="square">   <!-- disc square circle -->
        <li>Muneeb</li>
        <li>Ali</li>
        <li>Haider</li>
    </ul>

    <h1>Ordered list</h1>
    <ol type="A">   <!-- default(1)  A  I,II,III -->
        <li>Muneeb</li>
        <li>Ali</li>
        <li>Haider</li>
    </ol>
    
    <h1>Defination list</h1>
    <dl>
        <dt>Html</dt>
        <dd>Language used for indexing.</dd>
        <dt>CSS</dt>
        <dd>Language used for styling.</dd>
        <dt>JavaScript</dt>
        <dd>Language used for functionality.</dd>
    </dl>

</body>
</html>

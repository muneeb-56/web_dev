<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query</title>
    <style>
        body{
            background-color: rgb(5, 0, 163);
        }
        div{
            color: rgb(255, 255, 255);
            font-size: larger;
        }

        .boxes{
            display: flex;
        }
        .box{
            background-color: rgb(4, 0, 80);
            width: 200px;
            height: 200px;
            margin: 5px;
            border: 2px solid rgb(255, 255, 255);
            border-radius: 30px;
        }

        /* @media not|only mediatype and (expression){
        CSS-Code 
        }  */

        @media(max-width:320px){
            body{
                
                background-color: rgb(0, 143, 143);
            }
            div{
                color:rgb(0, 0, 0)
            }
            .boxes{
                
                flex-direction: column;
            }
            .box{
                background-color: rgb(0, 183, 183);
            }
        }

        @media(orientation: landscape){
            body{
            background-color: beige;
            color: black;
            }
            .boxes{
                flex-direction: row;
            }
            .box{
                background-color: black;
            }
        }
    </style>
</head>
<body>

    <div>
        Media Query...
    </div>

    <div class="boxes">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
    
</body>
</html>

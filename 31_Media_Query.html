<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query</title>
    <style>
        body{
            background-color: rgb(37, 169, 121);
        }
        div{
            color: rgb(242, 255, 0);
            font-size: larger;
        }

        .boxes{
            display: flex;
        }
        .box{
            background-color: rgb(9, 0, 173);
            width: 200px;
            height: 200px;
            margin: 5px;
            border: 2px solid rgb(136, 6, 6);
            border-radius: 30px;
        }

        /* @media not|only mediatype and (expression){
        CSS-Code 
        }  */

        @media(max-width:320px){
            body{
                
                background-color: aqua;
            }
            div{
                color:black
            }
            .boxes{
                
                flex-direction: column;
            }
            .box{
                background-color: blanchedalmond;
            }
        }

        @media(orientation: landscape){
            body{
            background-color: beige;
            }
            .boxes{
                flex-direction: row;
            }
            .box{
                background-color: black;
            }
        }
    </style>
</head>
<body>

    <div>
        It is red.
    </div>

    <div class="boxes">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
    
</body>
</html>

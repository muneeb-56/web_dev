<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>

    <style>
       .container{
        border: 2px solid rgb(154, 11, 11);
        display: grid;
        grid-template-columns: 120px 100px;
       }

       .item{
        border: 2px solid rgb(33, 139, 10);
        border-radius: 10px;
        height: 55px;
        width: 55px;
       }

    </style>
</head>

<body>

    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
    </div>

</body>

</html>

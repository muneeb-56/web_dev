<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise Card</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        body{
            background-color: rgb(232, 232, 232);
            padding: 50px;
            display: flex;
            justify-content: center;
        }
        .maindiv{
            height: 420px;
            width: 250px;
            margin: 20px;
            padding: 5px;
            border-radius: 20px;
            background-color: white;
        }
        .image{
            padding: 8px;
        }
        img{
            width: 100%;
            border-radius: 20px;
        }
        .text{
            padding: 12px;
        }
        span{
            border: 0.8px solid grey;
            border-radius: 30px;
            padding: 2px 5px ;
        }
        .text h2{
            margin-top: 10px;
        }
        p{
            margin-top: 10px;
        }
        .button{
            display: flex;
            justify-content: center;
        margin-top: 10px;
        }
        button{
            color: rgb(0, 166, 255);
            background-color: rgb(214, 241, 255);
            border-radius: 20px;
            border: 1px;
            padding: 5px 8px;
        }

    </style>
</head>
<body>

    <div class="maindiv">
        <div class="image">
        <img src="https://thumbs.dreamstime.com/b/aerial-view-speed-motor-boat-open-sea-travel-leasure-activities-concept-159043787.jpg?w=768"></div>

        <div class="text">
            <span>Nature</span>
            <span>Lake</span>
            <h2>Lake View</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Debitis blanditiis repellat quidem ipsa a mollitia, quos animi nisi quod reiciendis illum iusto!</p>

            <div class="button"><button>Read More</button></div>
        </div>
    </div>

</body>
</html>

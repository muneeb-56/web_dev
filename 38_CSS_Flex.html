<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>

    <style>
        body {
            background-color: black;
        }

        .row {
            border: 2px solid rgb(255, 255, 255);
            height: 60vh;
            margin: 10px;
            padding: 10px;
            display: flex;
            flex-direction: row;
            justify-content: center;
            /* align-items: center; */

            align-content: center;

            /*During Wrap Property*/
            /* align-content: flex-end; */
            /* align-content: flex-start; */
            flex-wrap: wrap;
            /* flex-wrap: wrap-reverse; */

            /* flex-flow: row wrap-reverse; */
            /* it is used to apply direction & wrap at once */

            /* gap: 5px; */
            row-gap: 8px;
            column-gap: 5px;

            /* gap: row column; */
        }

        .item {
            background-color: blue;
            border: 1.5px solid rgb(255, 255, 255);
            border-radius: 20px;
            width: 10vw;
            height: 10vh;
            margin: 2px;
            color: white;
            display: flex; /*For text inside*/
            justify-content: center;
            align-items: center;

            /* flex-grow: 1; */
        }

        .items {
            background-color: rgb(15, 255, 183);
            border: 1.5px solid rgb(255, 255, 255);
            border-radius: 20px;
            width: 10vw;
            height: 10vh;
            margin: 2px;
            display: flex;
            justify-content: center;
            align-items: center;

            /* flex-grow: 1; */
        }
        
        /* .grow4{
            flex-grow: 4;
        } */
         
        /* .shrink{
            flex-shrink: 2;
        } */
        .order1{
            order: 1;
        }

        .order2{
            order: 2;
        }
        
        .order3{
            order: 3;
        }

        .col {
            border: 2px solid rgb(255, 255, 255);
            height: 70vh;
            margin: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            /* flex-direction: column-reverse; */

            justify-content: center;
            /*Justify works with Main-Axis first*/
            align-items: center;
        }
        .cole{
            align-self: flex-end;
        }
        .cols{
            align-self: flex-start;
        }
    </style>
</head>

<body>

    <div class="row">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item shrink">3</div>
        <div class="items grow4 order2">4</div>
        <div class="items">5</div>
        <div class="items">6</div>
        <div class="item">7</div>
        <div class="item">8</div>
        <div class="item order1">9</div>
        <div class="items order1" >10</div>
        <div class="items">11</div>
        <div class="items">12</div>
        <div class="item">13</div>
        <div class="item">14</div>
        <div class="item">15</div>
        <div class="items order3">16</div>
        <div class="items">17</div>
        <div class="items">18</div>
    </div>

    <div class="col">
        <div class="item">1</div>
        <div class="item cole">2</div>
        <div class="item">3</div>
        <div class="items">4</div>
        <div class="items cols">5</div>
        <div class="items">6</div>
    </div>
</body>

</html>

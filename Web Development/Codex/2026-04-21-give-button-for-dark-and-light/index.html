<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Toggle</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="card">
      <p class="eyebrow">Interactive Theme Switch</p>
      <h1>Dark and light mode, one button.</h1>
      <p class="copy">
        Click the button to switch themes. The icon changes between a moon and a sun
        so the current mode is always easy to spot.
      </p>

      <button
        class="theme-toggle"
        id="themeToggle"
        type="button"
        aria-label="Switch to dark mode"
        aria-pressed="false"
      >
        <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="presentation">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2.5M12 19.5V22M4.93 4.93l1.77 1.77M17.3 17.3l1.77 1.77M2 12h2.5M19.5 12H22M4.93 19.07l1.77-1.77M17.3 6.7l1.77-1.77"></path>
          </svg>
        </span>
        <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="presentation">
            <path d="M20 15.5A8.5 8.5 0 0 1 8.5 4 9 9 0 1 0 20 15.5Z"></path>
          </svg>
        </span>
        <span class="theme-toggle__text" id="themeToggleText">Light mode</span>
      </button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

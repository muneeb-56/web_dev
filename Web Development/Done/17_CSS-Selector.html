<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Element Selector
        div{
            background-color: red;
        } */

        /* Class selector */
        .red{
            color: wheat;
            background-color: Blue;
        }

        /* ID selector */
        #green{
            color: green;
        }

        /* Child selector (direct child only)
        div>p{
            background-color: beige;
            color: rgb(182, 33, 223);
        } */

        /* Decendent selector */
        div p{
            color: aqua;
        }

        /* Universal selector */
        *{
            background-color: black;
            margin: 0;
        }

        /* Pseudo selector */
        a:visited{
            color: Yellow;
        }
        a:link{
            color: brown;
        }
        a:active{
            background-color: antiquewhite;
        }


        a:hover{
            background-color: whitesmoke;
        }


    </style>
</head>
<body>
    
    <div class="red">
        I am a div.
    </div>

    <div id="green">
        I am green.
    </div>


    <a href="https://www.google.com">Go to Google</a>
    <div>
        <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Accusamus, possimus voluptatum.</p>
    </div>
</body>
</html>
